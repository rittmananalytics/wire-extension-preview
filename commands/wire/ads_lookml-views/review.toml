# Agentic Data Stack â€” LookML Views Review

## Purpose

Get confirmation from the Looker admin and data team that the generated view files correctly expose the canonical models, are wired into the right explores, and are ready to receive metric definitions from `ads_semantic-layer-generate`.

The audience is technical â€” Looker developers and analytics engineers, not business stakeholders.

## Usage

```bash
/wire:ads_lookml-views-review YYYYMMDD_client_agentic_data_stack
```

## Prerequisites

- `lookml_views.validate: complete`

## Skip Condition

If `lookml_views.generate: skipped` in status.md, output:

```
LookML Views â€” Review Skipped (bi_tool is not looker)
```

Update status and stop.

---

## Workflow

### Step 1: Search Meeting Context

Before presenting the review summary, search Fathom for recent calls that discussed LookML structure, explore design, or Looker project conventions for this client. Surface any decisions or constraints that bear on view file design.

---

### Step 2: Present Review Summary

```
## LookML Views Review

### Views Created (N)

| View | File | Canonical Model | Explore |
|---|---|---|---|
| fct_orders | views/fct_orders.view.lkml | fct_orders | orders_explore |
| dim_customers | views/dim_customers.view.lkml | dim_customers | orders_explore |

### Views Updated (N)

| View | File | Changes |
|---|---|---|
| fct_subscriptions | views/fct_subscriptions.view.lkml | net_mrr renamed from mrr_amount; churn_date added |

### Validation Results

- LookML syntax: PASS (0 errors)
- Column references: PASS (0 orphaned)
- Primary keys: PASS
- Explore wiring: PASS (all views reachable)

### What Happens Next

ads_semantic-layer-generate will add measure definitions to these view files
(no structural changes â€” measures only). Confirm the view scaffolding is
correct before proceeding.
```

---

### Step 3: Review Questions

Ask the Looker admin and data team to confirm:

1. **Explore coverage** â€” are all new views in the correct explores? Are there existing explores that also need access to the new views?
2. **View naming** â€” do the generated view names follow the project's existing convention?
3. **Label conventions** â€” do dimension labels match how the business refers to these fields?
4. **Hidden fields** â€” are the correct FK and technical columns marked `hidden: yes`?
5. **Missing dimensions** â€” are there ARRAY/STRUCT columns (skipped in generation) that need manual view expansion before metrics can reference them?

---

### Step 4: Handle Feedback

For each piece of feedback, apply changes to the view files and re-run `ads_lookml-views-validate` before returning to this review.

Common changes at this stage:
- Rename a view or dimension to match existing project conventions
- Add a missing explore join
- Adjust `hidden` flags
- Resolve a `# TODO: confirm primary_key` comment

Do not add measures â€” any metric-level feedback belongs in the `ads_semantic-layer-design` review, which has already been completed. Log it in `lookml_views_notes.md` under a "Deferred to semantic layer" section instead.

---

### Step 5: Record Sign-off

```yaml
lookml_views:
  review: approved
  reviewer: Name
  review_date: YYYY-MM-DD
  notes: ""
```

Once approved, `ads_semantic-layer-generate` can proceed.

Execute the complete workflow as specified above.

## Execution Logging

After completing the workflow, append a log entry to the project's execution_log.md:

# Execution Log â€” Command and Skill Logging

## Purpose

After completing any generate, validate, or review workflow (or a project management command that changes state), append a single log entry to the project's execution log file. Skills also append an entry on activation, making the log a unified trace of all agent activity â€” both explicit commands and auto-activated skills.

## Log File Location

```
<DP_PROJECTS_PATH>/<project_folder>/execution_log.md
```

Where `<project_folder>` is the project directory passed as an argument (e.g., `20260222_acme_platform`).

## Format

If the file does not exist, create it with the header:

```markdown
# Execution Log

| Timestamp | Command | Result | Detail |
|-----------|---------|--------|--------|
```

Then append one row per execution:

```markdown
| YYYY-MM-DD HH:MM | /wire:<command> | <result> | <detail> |
```

### Field Definitions

- **Timestamp**: Current date and time in `YYYY-MM-DD HH:MM` format (24-hour, local time)
- **Command**: Either the `/wire:*` command invoked, or `skill` for a skill activation entry
- **Result / Skill name**: For commands, the outcome; for skills, the skill identifier. Use one of:
  - `complete` â€” generate command finished successfully
  - `pass` â€” validate command passed all checks
  - `fail` â€” validate command found failures
  - `approved` â€” review command: stakeholder approved
  - `changes_requested` â€” review command: stakeholder requested changes
  - `created` â€” `/wire:new` created a new project
  - `archived` â€” `/wire:archive` archived a project
  - `removed` â€” `/wire:remove` deleted a project
  - `activated` â€” a skill was auto-activated (used with `skill` in the Command column)
  - `override` â€” `specs/utils/precondition_gate.md` recorded a consultant overriding an unmet precondition
- **Detail**: A concise one-line summary of what happened. Include:
  - For generate: number of files created or key output filename
  - For validate: number of checks passed/failed
  - For review: reviewer name and brief feedback if changes requested
  - For new: project type and client name
  - For archive/remove: project name
  - For skill activations: brief description of what triggered the skill
  - For override: the unmet precondition, who overrode it, and their reason

## Skill Activation Entries

When a skill activates, it appends a row in the same format as commands, using `skill` in the Command column and the skill identifier in the Result column:

```markdown
| YYYY-MM-DD HH:MM | skill | <skill-identifier> | activated | <brief trigger description> |
```

Skill identifiers:

| Skill | Identifier |
|-------|-----------|
| Engagement Context | `engagement-context` |
| Research Persistence | `research-persistence` |
| dbt Development | `dbt-development` |
| LookML Content Authoring | `lookml-authoring` |
| dbt Analytics QA | `dbt-analytics-qa` |
| dbt Migration | `dbt-migration` |
| dbt Troubleshooting | `dbt-troubleshooting` |
| dbt Semantic Layer | `dbt-semantic-layer` |
| dbt Unit Testing | `dbt-unit-testing` |
| dbt DAG | `dbt-dag` |
| Dagster | `dagster` |
| Fivetran | `fivetran` |
| Project Review | `project-review` |
| Looker Dashboard Mockup | `looker-dashboard-mockup` |

This makes skill activations visible in the same log that captures command invocations, enabling full activity tracing across both explicit commands and automatic skill triggers.

## Rules

1. **Append only** â€” never modify or delete existing log entries
2. **One row per command execution** â€” even if a command is re-run, add a new row (this creates the revision history)
3. **Always log after status.md is updated** â€” the log entry should reflect the final state
4. **Pipe characters in detail** â€” if the detail text contains `|`, replace with `â€”` to preserve table formatting
5. **Keep detail under 120 characters** â€” be concise

## Example

```markdown
# Execution Log

| Timestamp | Command | Result | Detail |
|-----------|---------|--------|--------|
| 2026-02-22 14:30 | skill | engagement-context | activated | Context loaded for new conversation |
| 2026-02-22 14:35 | /wire:new | created | Project created (type: full_platform, client: Acme Corp) |
| 2026-02-22 14:40 | /wire:requirements-generate | complete | Generated requirements specification (3 files) |
| 2026-02-22 15:12 | /wire:requirements-validate | pass | 14 checks passed, 0 failed |
| 2026-02-22 16:00 | /wire:requirements-review | approved | Reviewed by Jane Smith |
| 2026-02-23 09:15 | /wire:conceptual_model-generate | complete | Generated entity model with 8 entities |
| 2026-02-23 10:30 | /wire:conceptual_model-validate | fail | 2 issues: missing relationship, orphaned entity |
| 2026-02-23 11:00 | /wire:conceptual_model-generate | complete | Regenerated entity model (fixed 2 issues, 8 entities) |
| 2026-02-23 11:15 | /wire:conceptual_model-validate | pass | 12 checks passed, 0 failed |
| 2026-02-23 14:00 | /wire:conceptual_model-review | changes_requested | Reviewed by John Doe â€” add Customer entity |
| 2026-02-23 15:30 | /wire:conceptual_model-generate | complete | Regenerated entity model (9 entities, added Customer) |
| 2026-02-23 15:45 | /wire:conceptual_model-validate | pass | 14 checks passed, 0 failed |
