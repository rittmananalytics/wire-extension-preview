# Omni Audit ‚Äî Generate

## Purpose

Catalogs the client's Omni reporting layer: every connection, the model (topics, views, dimensions, measures, relationships), and the folder ‚Üí workbook ‚Üí tile content hierarchy, plus the warehouse objects each model view reads from. The output maps view-to-warehouse dependencies so the migration inventory can sequence cutover correctly ‚Äî views cannot be repointed to the target until their source warehouse objects exist there ‚Äî and records which model views, and which individual tiles, carry source-platform SQL dialect that needs translating.

This is a **reporting-layer** audit, the Omni counterpart to the Metabase and reverse ETL audits. It is **not gated by `migration.scope`** ‚Äî it runs for any migration where the client uses Omni, full migration or tenant carve-out alike.

Omni's object model splits dialect-specific SQL differently to Metabase's. Metabase scatters native SQL across individually-authored cards; Omni concentrates it in the model's view definitions (base table SQL, derived table SQL), which a handful of modelers maintain centrally. Most tiles query through a topic and carry no SQL of their own ‚Äî dialect-neutral, and they inherit whatever the model resolves to. A tile with a raw-SQL override is the exception, not the default, and gets the same source-dialect scan as a Metabase native-SQL card. This audit therefore classifies migration approach at the **view** level, not the tile level, and separately flags the smaller set of raw-SQL-override tiles for their own classification.

## Prerequisites

- Release folder with `release_type: platform_migration` in `status.md`
- `migration.reporting_tool: omni` set in `status.md`
- Omni CLI configured against the instance ‚Äî a named profile (`omni config use <profile>`), or `OMNI_BASE_URL` + `OMNI_API_TOKEN` passed explicitly (see `skills/omni/SKILL.md` Step 0)

## Inputs

- `.wire/releases/$ARGUMENTS/status.md`
- The Omni instance, via the Omni CLI
- `.wire/releases/$ARGUMENTS/audit/dbt_audit.md` (if present ‚Äî cross-reference dbt model dependencies)

## Workflow

### Step 1: Locate the release

Confirm `release_type: platform_migration` in `status.md`. Read `migration.reporting_tool` ‚Äî if it is not `omni`, stop and output:

```
reporting_tool is not set to omni.
Set migration.reporting_tool: omni in status.md and re-run.
```

Activate the `omni` skill (`skills/omni/SKILL.md`) for connection details and the object hierarchy.

If the audit file already exists at `audit/omni_audit.md`, ask whether to re-generate (overwrite) or update (append new items only).

### Step 2: Connect to Omni

Per `skills/omni/SKILL.md` Step 0:

```
omni config show
omni config use <profile-name>
```

If no profile exists, try `--base-url "$OMNI_BASE_URL" --token "$OMNI_API_TOKEN"` explicitly. There is **no CSV/inventory fallback for Omni** ‚Äî the CLI is the only supported access path. If neither a configured profile nor the environment variables are available, stop and output:

```
No Omni CLI access configured. Provide one of:

  1. A configured profile ‚Äî run `omni config init`, or `omni config use <profile-name>`
     if one already exists
  2. OMNI_BASE_URL + OMNI_API_TOKEN environment variables

Then re-run: /wire:omni-audit-generate $ARGUMENTS
```

### Step 3: Catalog connections

Using `omni-admin`, enumerate every connection: id, name, engine (e.g. `snowflake`), and which model views run against each. The connection is the pivot for repointing at migration time.

### Step 4: Catalog the model

Using `omni-model-explorer`, walk the model: topics, and for every view exposed through a topic:

| Field | Source |
|---|---|
| `view_id` / `view_name` | view identifier / name |
| `topic_ids` | topics that expose this view |
| `connection_id` | the connection this view's table/query runs against |
| `sql_type` | `base_table` (points at a table, no SQL) / `base_table_sql` / `derived_table` |
| `sql_summary` | first 200 chars of the view's base or derived table SQL, where present |
| `warehouse_objects` | resolved source tables/views (see resolution below) |
| `source_resolved` | true if ‚â•1 object resolved, else false |
| `dimension_count` / `measure_count` | count of fields defined on the view |
| `relationships` | other views this one joins to |
| `complexity` | assigned in Step 6 |
| `migration_approach` | assigned in Step 6 |

**Warehouse object extraction**: for views with `sql_type: base_table`, resolve directly to the underlying warehouse table/view (dialect-neutral ‚Äî no SQL to translate). For `base_table_sql` and `derived_table`, parse the view's SQL to extract referenced schema-qualified table/view names. Cross-reference resolved objects against the dbt audit where present, to confirm each is in migration scope. For any view where no source object resolves, set `warehouse_objects` empty **and** `source_resolved: false` so it is counted and listed, never silently dropped.

**Source-resolution coverage metric**: over active views, compute `active_view_count`, `resolved_view_count`, `unresolved_view_count`, and `source_resolution_coverage_pct = resolved / active`, broken down by `sql_type`.

### Step 5: Catalog folders, workbooks, and tiles

Using `omni-content-explorer`, walk the content hierarchy: folder ‚Üí workbook/document ‚Üí tile. For each tile:

| Field | Source |
|---|---|
| `tile_id` / `tile_name` | tile identifier / name |
| `workbook_id` / `workbook_name` | the tile's workbook/document |
| `folder_id` / `folder_name` | the workbook's folder |
| `query_surface` | `topic` (queries through the model) or `raw_sql` (SQL override) |
| `topic_id` | the topic queried, if `query_surface: topic` |
| `sql_summary` | first 200 chars of the raw SQL, if `query_surface: raw_sql` |
| `warehouse_objects` | resolved source objects, for `raw_sql` tiles only |
| `source_resolved` | for `raw_sql` tiles only |
| `migration_approach` | `inherits_via_model` for `topic` tiles; assigned in Step 6 for `raw_sql` tiles |
| `include_in_migration` | true (default) unless archived / unused >90 days |
| `migration_notes` | auto-generated |

A `topic`-backed tile needs no migration work of its own: once the model's connection swap and view translations are promoted, the tile resolves against the target automatically. Only `raw_sql` tiles carry their own dialect risk ‚Äî scan each one's SQL for source-platform constructs the same way as a view.

### Step 6: Classify views and raw-SQL tiles

**Views** ‚Äî assign complexity (Low / Medium / High) and migration approach:

- `repoint` ‚Äî the view has no SQL (`base_table`) or portable SQL; only the connection changes after warehouse migration
- `rewrite_sql` ‚Äî the view's base/derived table SQL uses source-platform dialect; translate to the target dialect before repointing
- `rebuild` ‚Äî the view depends on a source-only construct with no direct translation; rebuild against the target connection

Default: `base_table` views ‚Üí `repoint` (Low). Scan `base_table_sql` and `derived_table` SQL for source-dialect constructs (`::` casts, `FLATTEN`, `QUALIFY`, `IFF`, `NVL`, `CONVERT_TIMEZONE`, variant `:` paths) and reclassify `repoint` ‚Üí `rewrite_sql` where found; reclassify to `rebuild` where no direct translation exists.

**Raw-SQL tiles** ‚Äî assign the same three buckets (`repoint` / `rewrite_sql` / `rebuild`), scanned against the same construct list. Topic-backed tiles do not get their own bucket; they carry `migration_approach: inherits_via_model`.

### Step 7: Write the audit report

**Output location**: `.wire/releases/$ARGUMENTS/audit/omni_audit.md`

Include:
- Summary table (connections, topics, views by approach, views by complexity, tiles by query surface, raw-SQL tiles by approach)
- **Source-resolution coverage**: `resolved_view_count` / `active_view_count` (`source_resolution_coverage_pct`), broken down by `sql_type`
- Full model catalog: topic ‚Üí view table (SQL summaries, dimension/measure counts, relationships)
- Content hierarchy: folder ‚Üí workbook ‚Üí tile
- Connection inventory (engine, views per connection)
- Warehouse object dependency map (which warehouse objects each view depends on)
- Raw-SQL tile catalog (tile, workbook, SQL summary, resolved objects, migration approach)
- **Unresolved views** ‚Äî every active view with `source_resolved: false`, listed explicitly
- **Unresolved raw-SQL tiles** ‚Äî every raw-SQL tile with `source_resolved: false`, listed explicitly
- dbt model dependencies (views that cannot be repointed until a dbt migration batch is complete)
- Excluded / decommission candidates (archived or unused workbooks/tiles)

