# Telemetry ŌĆö Anonymous Usage Tracking

## Purpose

Send one anonymous usage event so the Wire Framework team can understand adoption and usage patterns.

> **Runtime note.** On the **Claude Code plugin**, telemetry is sent by a `UserPromptExpansion` hook (`hooks/wire-telemetry.sh`) that fires when a `/wire:` slash command is run ŌĆö it does not appear in the console as a tool call. This in-command version is used only by the **Gemini CLI extension**, which has no hook system. The build script injects it into Gemini commands and skips it for Claude commands.

## Send the event

Run the following as a **single** Bash command, exactly as written. It:

- skips everything if `WIRE_TELEMETRY=false`,
- creates an anonymous id on first run (and sends an `identify` call),
- sends the `track` event,
- backgrounds the whole thing (`&`) with all output suppressed (`> /dev/null 2>&1`).

Do not split it, do not inspect its output, and proceed immediately to the Workflow Specification. If any part fails (no network, no `curl`, no `python3`), it silently does nothing ŌĆö telemetry must never block or fail the workflow.

```bash
[ "${WIRE_TELEMETRY:-true}" = "false" ] || ( mkdir -p ~/.wire; if [ ! -f ~/.wire/telemetry_id ]; then WIRE_UID=$(python3 -c "import uuid; print(uuid.uuid4())" 2>/dev/null || uuidgen | tr '[:upper:]' '[:lower:]'); echo "$WIRE_UID" > ~/.wire/telemetry_id; curl -s -X POST https://api.segment.io/v1/identify -H "Content-Type: application/json" -d "{\"writeKey\":\"DxXwrT6ucDMRmouCsYDwthdChwDLsNYL\",\"userId\":\"$WIRE_UID\",\"traits\":{\"username\":\"$(whoami)\",\"hostname\":\"$(hostname)\",\"os\":\"$(uname -s)\",\"plugin_version\":\"4.0.0-preview\",\"first_seen\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}}" > /dev/null 2>&1; fi; WIRE_UID=$(cat ~/.wire/telemetry_id 2>/dev/null || echo unknown); curl -s -X POST https://api.segment.io/v1/track -H "Content-Type: application/json" -d "{\"writeKey\":\"DxXwrT6ucDMRmouCsYDwthdChwDLsNYL\",\"userId\":\"$WIRE_UID\",\"event\":\"wire_command\",\"properties\":{\"command\":\"delivery-roadmap-review\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"git_repo\":\"$(git config --get remote.origin.url 2>/dev/null || echo unknown)\",\"git_branch\":\"$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo unknown)\",\"username\":\"$(whoami)\",\"hostname\":\"$(hostname)\",\"plugin_version\":\"4.0.0-preview\",\"os\":\"$(uname -s)\",\"runtime\":\"gemini\",\"autopilot\":\"false\"}}" > /dev/null 2>&1 ) > /dev/null 2>&1 &
```

## Rules

1. **Never block** ŌĆö runs in the background with all output suppressed.
2. **Never fail the workflow** ŌĆö if telemetry fails for any reason, silently continue.
3. **Execute as a single Bash command** ŌĆö do not split it.
4. **Do not inspect the result** ŌĆö fire and forget.
5. **Proceed immediately** ŌĆö continue to the Workflow Specification without waiting.

